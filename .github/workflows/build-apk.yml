name: Build Android APK

on:
  push:
    branches: [claude/nota-ai-app-setup-scwoji]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/nota-ai-app-setup-scwoji

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nota-ai/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: nota-ai
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (generate native Android project)
        working-directory: nota-ai
        run: npx expo prebuild --platform android --no-install
        env:
          CI: 1

      - name: Create android/app/package.json stub
        working-directory: nota-ai
        run: |
          # @expo/cli export:embed requires package.json to exist in android/app/
          # Gradle calls the CLI with android/app as the project root context
          echo '{"name":"nota-ai","version":"1.0.0","private":true}' > android/app/package.json

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Disable R8 minification (prevents expo-modules class stripping)
        run: |
          sed -i 's/minifyEnabled true/minifyEnabled false/g' nota-ai/android/app/build.gradle || true
          sed -i 's/android.enableProguardInReleaseBuilds=true/android.enableProguardInReleaseBuilds=false/g' nota-ai/android/gradle.properties || true
          echo "android.enableProguardInReleaseBuilds=false" >> nota-ai/android/gradle.properties

      - name: Pre-bundle JS via @expo/cli export:embed (surface Metro errors before Gradle)
        working-directory: nota-ai
        run: |
          mkdir -p android/app/src/main/assets android/app/src/main/res
          node node_modules/expo/node_modules/@expo/cli/build/bin/cli export:embed \
            --platform android \
            --dev false \
            --reset-cache \
            --entry-file index.ts \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
          echo "Bundle size: $(wc -c < android/app/src/main/assets/index.android.bundle) bytes"

      - name: Build release APK
        working-directory: nota-ai/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Locate and rename APK
        run: |
          APK=$(find nota-ai/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK at: $APK"
          cp "$APK" nota-ai-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nota-ai-apk
          path: nota-ai-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOTA AI v1.0.${{ github.run_number }}
          body: |
            ## NOTA AI — Android APK

            **Install instructions:**
            1. Tap the `.apk` file below to download
            2. Android will ask to allow installing from unknown sources — tap **Settings → Allow**
            3. Tap **Install**
            4. Open NOTA AI → go to **Settings** tab → enter your API keys

            **Free API keys:**
            - Deepgram (speech): deepgram.com — 200h/month free
            - Anthropic (AI): console.anthropic.com — pay-as-you-go
          files: nota-ai-v${{ github.run_number }}.apk
          make_latest: true
