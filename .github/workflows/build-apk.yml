name: Build Android APK

on:
  push:
    branches: [claude/nota-ai-app-setup-scwoji]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/nota-ai-app-setup-scwoji

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nota-ai/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: nota-ai
        run: npm install

      - name: Expo prebuild (generate native Android project)
        working-directory: nota-ai
        run: npx expo prebuild --platform android --no-install
        env:
          CI: 1

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build release APK
        working-directory: nota-ai/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Rename APK
        run: |
          cp nota-ai/android/app/build/outputs/apk/release/app-release-unsigned.apk \
             nota-ai-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nota-ai-apk
          path: nota-ai-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOTA AI v1.0.${{ github.run_number }}
          body: |
            ## NOTA AI — Android APK

            **Install instructions:**
            1. Tap the `.apk` file below to download
            2. Android will ask to allow installing from unknown sources — tap **Settings → Allow**
            3. Tap **Install**
            4. Open NOTA AI → go to **Settings** tab → enter your API keys

            **Free API keys:**
            - Deepgram (speech): deepgram.com — 200h/month free
            - Anthropic (AI): console.anthropic.com — pay-as-you-go
          files: nota-ai-v${{ github.run_number }}.apk
          make_latest: true
